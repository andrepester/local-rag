name: supply-chain

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "31 3 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  sbom-and-licenses:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"

      - name: Install CycloneDX Go generator
        run: go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@v1.9.0

      - name: Generate Go SBOM (CycloneDX)
        run: cyclonedx-gomod app -json -licenses -output sbom-go.cdx.json ./...

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-go-cyclonedx
          path: sbom-go.cdx.json

      - name: Install go-licenses
        run: go install github.com/google/go-licenses@v1.6.0

      - name: Export dependency licenses
        run: go-licenses report ./... > licenses.csv

      - name: Enforce license allowlist
        run: |
          set -euo pipefail
          disallowed=0
          while IFS=, read -r module license_url license_id; do
            if [ -z "${module}" ]; then
              continue
            fi
            case "${license_id}" in
              MIT|BSD-2-Clause|BSD-3-Clause|Apache-2.0|ISC|MPL-2.0)
                ;;
              *)
                echo "Disallowed or unknown license: ${module} (${license_id})"
                disallowed=1
                ;;
            esac
          done < licenses.csv

          if [ "${disallowed}" -ne 0 ]; then
            echo "License policy check failed"
            exit 1
          fi

      - name: Upload license report artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-licenses-report
          path: licenses.csv

  vulnerability-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build runtime image
        run: docker build -t local-rag-scan:ci .

      - name: Trivy filesystem scan (SARIF)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif
          exit-code: '1'

      - name: Upload filesystem SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: local-rag-scan:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: '1'
